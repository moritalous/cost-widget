name: Store package

# Builds the unsigned, Store-ready .msix and uploads it as a workflow artifact.
# Download it from the run and upload it in Partner Center. Distribution is via
# the Microsoft Store; GitHub hosts source only (no binary Releases).
#
# Manually pushed v* tags trigger this via on-push. check-ccusage-update.yml
# instead dispatches this workflow explicitly for the tag it creates, because
# tags pushed with GITHUB_TOKEN never fire on-push workflows. On success, an
# issue is opened as a reminder to upload the package in Partner Center, since
# Store submission itself stays manual.
#
# Requires three repository variables (Settings > Secrets and variables >
# Actions > Variables), taken from Partner Center > Product identity:
#   STORE_IDENTITY_NAME           e.g. moritalous.TokenCostWidget
#   STORE_IDENTITY_PUBLISHER      e.g. CN=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
#   STORE_PUBLISHER_DISPLAY_NAME  e.g. moritalous
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags, needed to resolve the previous tag for the
          # auto-generated release notes in the Notify step below.
          fetch-depth: 0

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = '${{ github.ref_name }}'
          $app = $ref -replace '^v', ''
          if ($app -notmatch '^\d+\.\d+\.\d+') {
            $app = ([xml](Get-Content src/CostWidgetProvider/AppxManifest.xml)).Package.Identity.Version
          }
          "app=$app" >> $env:GITHUB_OUTPUT

      - name: Pack Store MSIX
        shell: pwsh
        env:
          STORE_IDENTITY_NAME: ${{ vars.STORE_IDENTITY_NAME }}
          STORE_IDENTITY_PUBLISHER: ${{ vars.STORE_IDENTITY_PUBLISHER }}
          STORE_PUBLISHER_DISPLAY_NAME: ${{ vars.STORE_PUBLISHER_DISPLAY_NAME }}
        run: .\scripts\pack.ps1 -Version '${{ steps.ver.outputs.app }}'

      - uses: actions/upload-artifact@v7
        with:
          name: store-msix
          path: build/TokenCostWidget_*.msix
          if-no-files-found: error

      - name: Notify
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $lines = @(
            'The msix build is done. Please upload the package in Partner Center.'
            ''
            '- Tag: ${{ github.ref_name }}'
            "- Workflow run: $runUrl"
            '- Partner Center: https://partner.microsoft.com/dashboard/products/9NP02K9JKHNV/overview'
          )

          # Same content GitHub's "auto-generate release notes" produces, via
          # the underlying API -- without creating an actual Release, since
          # distribution here stays Store-only.
          if ('${{ github.ref_type }}' -eq 'tag') {
            $allTags = @(git tag -l --sort=-v:refname 'v*')
            $idx = [Array]::IndexOf($allTags, '${{ github.ref_name }}')
            $prevTag = $null
            if ($idx -ge 0 -and $idx + 1 -lt $allTags.Length) {
              $prevTag = $allTags[$idx + 1]
            }

            if ($prevTag) {
              $notesJson = gh api "repos/${{ github.repository }}/releases/generate-notes" -f "tag_name=${{ github.ref_name }}" -f "previous_tag_name=$prevTag"
            }
            else {
              $notesJson = gh api "repos/${{ github.repository }}/releases/generate-notes" -f "tag_name=${{ github.ref_name }}"
            }
            $notes = $notesJson | ConvertFrom-Json

            $lines += ''
            $lines += '---'
            $lines += ''
            $lines += $notes.body
          }

          $body = $lines -join "`n"
          gh issue create --title "Ready for Store submission: ${{ github.ref_name }}" --body $body
