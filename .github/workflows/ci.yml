name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Verify formatting
        run: dotnet format src/CostWidgetProvider/CostWidgetProvider.csproj --verify-no-changes

      - name: Build
        run: dotnet build src/CostWidgetProvider/CostWidgetProvider.csproj -c Release
